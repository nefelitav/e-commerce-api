x-app-environment: &app-env
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${POSTGRES_DB:-shop}
  DB_USERNAME: ${POSTGRES_USER:-shop}
  DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
  REDIS_HOST: redis
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  REDIS_PORT: 6379

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: shop_api_app
    restart: unless-stopped
    volumes:
      - .:/var/www
    working_dir: /var/www
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 | grep -q pong || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - shop-network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: shop_api_queue
    restart: unless-stopped
    volumes:
      - .:/var/www
    working_dir: /var/www
    environment:
      <<: *app-env
    depends_on:
      app:
        condition: service_healthy
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shop-network

  nginx:
    image: nginx:alpine
    container_name: shop_api_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - .:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - shop-network

  postgres:
    image: postgres:16-alpine
    container_name: shop_api_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shop}
      POSTGRES_USER: ${POSTGRES_USER:-shop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shop}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shop-network

  redis:
    image: redis:7-alpine
    container_name: shop_api_redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shop-network

volumes:
  postgres_data:

networks:
  shop-network:
    driver: bridge

