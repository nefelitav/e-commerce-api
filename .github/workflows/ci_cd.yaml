name: PHP CI

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: [ '8.3' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, pdo, pdo_mysql
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Check coding standards
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Run tests with coverage
        run: vendor/bin/phpunit

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

      - name: Set up Docker Compose
        run: sudo apt-get update && sudo apt-get install -y docker-compose

      - name: Start docker-compose in detached mode
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: |
          for i in $(seq 1 120); do
            TOTAL_CONTAINERS=$(docker compose config --services | wc -l)
            HEALTHY_CONTAINERS=0

            for container in $(docker compose ps -q); do
              status=$(docker inspect --format='{{.State.Health.Status}}' $container 2>/dev/null || echo "no_healthcheck")
              if [ "$status" = "healthy" ]; then
                HEALTHY_CONTAINERS=$((HEALTHY_CONTAINERS + 1))
              fi
            done

            echo "Healthy containers: $HEALTHY_CONTAINERS / $TOTAL_CONTAINERS"

            if [ "$HEALTHY_CONTAINERS" -eq "$TOTAL_CONTAINERS" ] && [ "$TOTAL_CONTAINERS" -gt 0 ]; then
              echo "All containers are healthy!"
              exit 0
            fi

            sleep 1
          done

          echo "Timed out waiting for containers to be healthy"
          docker ps
          exit 1

