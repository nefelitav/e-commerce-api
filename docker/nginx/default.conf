# --- Rate limiting zones ---
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;

# --- Connection limiting zone ---
limit_conn_zone $binary_remote_addr zone=addr:10m;

# --- Upstream keepalive ---
upstream php-fpm {
    server app:9000;
    keepalive 16;
}

server {
    listen 80;
    index index.php;
    root /var/www/public;
    server_tokens off;
    charset utf-8;

    # --- Connection limit per IP ---
    limit_conn addr 50;

    # --- Restrict allowed HTTP methods ---
    if ($request_method !~ ^(GET|POST|PUT|DELETE|PATCH)$) {
        return 405;
    }

    client_max_body_size 20M;
    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 30s;

    # --- Security headers ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Request-Id $request_id always;

    # --- Hide server technology fingerprints ---
    proxy_hide_header X-Powered-By;
    fastcgi_hide_header X-Powered-By;

    # --- Gzip compression ---
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml;

    # --- Static file caching ---
    location ~* \.(ico|css|js|gif|jpeg|jpg|png|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # --- Nginx-level health check (no PHP-FPM dependency) ---
    location = /healthz {
        access_log off;
        return 200 'ok';
    }

    # --- Application health check endpoint ---
    location = /up {
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        limit_req zone=api burst=30 nodelay;
        limit_req_status 429;
    }

    # --- Only allow index.php execution ---
    location = /index.php {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_X_REQUEST_ID $request_id;
        fastcgi_read_timeout 60s;
        fastcgi_buffering on;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;
        fastcgi_keep_conn on;
        fastcgi_intercept_errors on;
    }

    # --- Block direct access to any other .php file ---
    location ~ \.php$ {
        deny all;
        return 404;
    }

    # --- Block dotfiles (except .well-known) ---
    location ~ /\.(?!well-known) {
        deny all;
    }

    # --- Block access to sensitive files ---
    location ~* (composer\.(json|lock)|\.env|artisan|phpunit|phpstan|\.git) {
        deny all;
        return 404;
    }
}
