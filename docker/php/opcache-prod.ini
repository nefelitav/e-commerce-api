[opcache]
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=64
opcache.max_accelerated_files=20000
opcache.validate_timestamps=0
opcache.save_comments=1
opcache.enable_file_override=1

; JIT compilation — tracing mode for maximum performance on PHP 8.3
opcache.jit=tracing
opcache.jit_buffer_size=128M

; Prevent wasted memory from restarts
opcache.max_wasted_percentage=10

; Log only errors, not warnings
opcache.log_verbosity_level=1

; Preloading (Laravel preload script, set in php.ini or here)
; opcache.preload=/var/www/vendor/autoload.php
; opcache.preload_user=www-data

