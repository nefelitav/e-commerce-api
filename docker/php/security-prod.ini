[PHP]
; --- Security hardening for production ---
expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /proc/self/fd/2

; Disable dangerous functions not needed by the API
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,parse_ini_file,show_source,dl

; Prevent URL-based file inclusion
allow_url_fopen = On
allow_url_include = Off

; Session security
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1
session.cookie_samesite = Lax

; Upload limits (match nginx client_max_body_size)
upload_max_filesize = 20M
post_max_size = 20M
max_input_vars = 1000

; Memory and execution limits
memory_limit = 128M
max_execution_time = 30
max_input_time = 60

