[www]
pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests = 1000
pm.process_idle_timeout = 10s

; Enable the ping/status endpoints for health checks
ping.path = /ping
ping.response = pong
pm.status_path = /fpm-status

; Logging
access.log = /dev/null
slowlog = /proc/self/fd/2
request_slowlog_timeout = 5s
request_terminate_timeout = 60s

; Security — restrict to index.php only
security.limit_extensions = .php

; Clear environment to avoid leaking host env vars
clear_env = yes

